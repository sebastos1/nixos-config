corner_radius 10
gaps inner 5
gaps outer 5
gaps bottom 0
hide_edge_borders smart
smart_gaps on

for_window [app_id="keylist"] floating enable, border none

output * {
    # hmm latency things. change if screen tearing
    max_render_time off
    allow_tearing yes
    adaptive_sync on
}

default_border pixel 2
default_floating_border pixel 2

# styling
set $bg #282828
set $fg #ebdbb2
set $border #928374
set $active #b4befe
set $inactive #3c3836
set $urgent #cc241d
client.focused          $active $active $fg $active $active
client.focused_inactive $inactive $inactive $fg $inactive $inactive
client.unfocused        $bg $bg $border $bg $bg
client.urgent           $urgent $urgent $fg $urgent $urgent



set $mod Mod4

# focus
bindsym $mod+j focus left
bindsym $mod+l focus right
bindsym $mod+k focus down
bindsym $mod+i focus up
bindsym $mod+Left focus left
bindsym $mod+Right focus right
bindsym $mod+Down focus down
bindsym $mod+Up focus up

bindsym $mod+Shift+j move left
bindsym $mod+Shift+l move right
bindsym $mod+Shift+k move down
bindsym $mod+Shift+i move up
bindsym $mod+Shift+Left move left
bindsym $mod+Shift+Right move right
bindsym $mod+Shift+Down move down
bindsym $mod+Shift+Up move up

bindsym $mod+Tab workspace next
bindsym $mod+Shift+Tab workspace prev

workspace 1 output DP-2
workspace 2 output DP-2
workspace 3 output DP-2
workspace 4 output DP-3
workspace 5 output DP-3
workspace 6 output DP-3
workspace 7 output HDMI-A-1
workspace 8 output HDMI-A-1
workspace 9 output HDMI-A-1

bindsym $mod+1 workspace number 1
bindsym $mod+2 workspace number 2
bindsym $mod+3 workspace number 3
bindsym $mod+4 workspace number 4
bindsym $mod+5 workspace number 5
bindsym $mod+6 workspace number 6
bindsym $mod+7 workspace number 7
bindsym $mod+8 workspace number 8
bindsym $mod+9 workspace number 9

bindsym $mod+Shift+1 move to workspace number 1
bindsym $mod+Shift+2 move to workspace number 2
bindsym $mod+Shift+3 move to workspace number 3
bindsym $mod+Shift+4 move to workspace number 4
bindsym $mod+Shift+5 move to workspace number 5
bindsym $mod+Shift+6 move to workspace number 6
bindsym $mod+Shift+7 move to workspace number 7
bindsym $mod+Shift+8 move to workspace number 8
bindsym $mod+Shift+9 move to workspace number 9

bindsym $mod+r mode "resize"
