config:
  font: JetBrains Mono Nerd Font
  # font_size: 16
  # theme: light
  mod: win
  columns: 2

keys:
  Modifier: [mod]

  Launchers and menus:
    Open terminal: [mod, enter]
    Open the launcher: [mod, d]


  Windows:
    Move focus: [mod, [h, j, k, l]]
    Move window: [mod, shift, [h, j, k, l]]
    Move window with mouse: [mod, mouse_left]
    Resize window: [mod, mouse_right]
    Close window: [mod, shift, w]
    Toggle fullscreen: [mod, f]
  Workspaces:
    Change workspace: [mod, [1,2,3]]
    Send window to workspace: [mod, shift, [1,2,3]]
  Layout:
    Split horizontal: [mod, h]
    Split vertical: [mod, v]
    Toggle split: [mod, e]
    Toggle tabbed: [mod, t]
    Toggle floating/tiling: [mod, shift, space]
    Focus floating/tiling: [mod, space]


  Screenshots:
    Screenshot: [print]
    Snipping tool: [mod, shift, s] # todo
  Clipboard manager:
    Todo: [mod, ctrl, v]

  Sway:
    Reload: [mod, shift, r]

  MCSR:
    Thin: [h]
    Wide: [g]
    Ninjabrain: [n]
    Tall: [m]