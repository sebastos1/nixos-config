{
    "layer": "top",
    "height": 35,
    "position": "bottom",
    "spacing": 0,
    "reload_style_on_change": false,
    "modules-left": [
        "sway/workspaces",
        "wlr/taskbar"
    ],
    "modules-center": [
        "sway/window"
    ],
    "modules-right": [
        "tray",
        "custom/keybinds",
        "custom/spacer",
        "memory",
        "cpu",
        "custom/spacer",
        "pulseaudio",
        "custom/vpn",
        "network",
        "custom/spacer",
        "clock"
    ],
    "sway/window": {
        "format": "",
        "all-outputs": true,
        "offscreen-css": true,
        "offscreen-css-text": ""
    },
    "sway/workspaces": {
        "format": "{icon}",
        "format-icons": {
            "focused": "\uf444",
            "default": "\uf4c3"
        },
        "persistent-workspaces": {
            "1": [
                "DP-2"
            ],
            "2": [
                "DP-2"
            ],
            "3": [
                "DP-2"
            ],
            "4": [
                "DP-3"
            ],
            "5": [
                "DP-3"
            ],
            "6": [
                "DP-3"
            ],
            "7": [
                "HDMI-A-1"
            ],
            "8": [
                "HDMI-A-1"
            ],
            "9": [
                "HDMI-A-1"
            ]
        }
    },
    "wlr/taskbar": {
        "format": "{icon} {title:.12}",
        "icon-size": 22,
        "on-click": "activate",
        "on-click-right": "close",
        "tooltip-format": "{title}",
        "ignore-list": []
    },
    "custom/keybinds": {
        "format": "󰌌",
        "on-click": "keylist",
        "tooltip": false
    },
    "memory": {
        "format": "{used}G ",
        "on-click": "ghostty -e btop"
    },
    "cpu": {
        "format": "{usage}% ",
        "on-click": "ghostty -e btop"
    },
    "pulseaudio": {
        "format": "{volume}% {icon}",
        "format-muted": "󰝟",
        "format-icons": {
            "default": [
                "󰕿",
                "󰖀",
                "󰕾"
            ]
        },
        "on-click": "pavucontrol",
        "on-scroll-up": "wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+",
        "on-scroll-down": "wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-",
        "smooth-scrolling-threshold": 1
    },
    "custom/date": {
        "format": "{}",
        "exec": "date '+%d/%m'",
        "interval": 60
    },
    "clock": {
        "format": "{:%d/%m %H:%M:%S}",
        "interval": 1,
        "tooltip-format": "<tt>{calendar}</tt>",
        "calendar": {
            "mode": "month",
            "format": {
                "today": "<span color='#ff6699'><b>{}</b></span>"
            }
        }
    },
    "custom/spacer": {
        "format": "|",
        "tooltip": false
    },
    "tray": {
        "icon-size": 18,
        "spacing": 5
    },
    "custom/vpn": {
        "format": "{}",
        "exec": "~/.config/sway/mullvad-check.sh",
        "return-type": "json",
        "interval": 10
    },
    "network": {
        "format": "",
        "format-ethernet": "\udb83\udc9d",
        "format-wifi": "{icon} ",
        "format-disconnected": "\udb83\udc9c",
        "format-icons": [
            "\udb82\udd2f",
            "\udb82\udd1f",
            "\udb82\udd22",
            "\udb82\udd25",
            "\udb82\udd28"
        ],
        "tooltip-format-wifi": "{essid} ({signalStrength}%)",
        "tooltip-format-ethernet": "{ifname}",
        "tooltip-format-disconnected": "Disconnected"
    }
}
